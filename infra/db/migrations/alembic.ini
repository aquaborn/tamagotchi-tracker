# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = infra/db/migrations

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present.
# defaults to the current working directory.
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# as well as the filename.
# If specified, requires the python-dateutil library that can be
# installed by adding `alembic[tz]` to the pip requirements
# string value is passed to dateutil.tz.gettz()
# leave blank for localtime
# timezone =

# max length of characters to apply to the
# "slug" field
# max_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sourceless = false

# version location specification; this defaults
# to infra/db/migrations/versions.  When using multiple version
# directories, initial revisions must be specified with --version-path.
# The path separator used here should be the separator specified by
# python's os.path.sep variable, which will be either forward or backward
# slash depending on the platform.  Multiple version directories are
# specified as space-delimited.
# version_locations = %(here)s/bar %(here)s/bat infra/db/migrations/versions

# the output encoding used when revision files
# are written from script.py.mako
# output_encoding = utf-8

db_url = postgresql://user:password@db:5432/tamagotchi

[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on each new revision script generated.  See the documentation for
# further detail and examples

# define your hooks here; multiple entries may be defined
# hook_name = hooks;

# hooks is a built-in hook that will automatically invoke the
# shell command defined by the variable "command".
# define the shell command "command" here:
# command = python -m black -l 79 %(filename)s

# replace default "sql" output with just the version number
# for use with pre-commit
# see https://gist.github.com/utek/61632507e9b811f3ec075eaf12598d02
# sql = alembic --hook-config sql_filename=%(filename)s sql
# sql_filename = %(version_path)s/%(slug)s.sql

# define the python function "fn" that is invoked above:
# fn = mypackage.mymodule:myfunc

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S