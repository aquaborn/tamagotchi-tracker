<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>🎮 Мультяшные Питомцы</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); min-height: 100vh; font-family: 'Segoe UI', sans-serif; padding: 12px; }
        h1 { text-align: center; color: #e94560; margin-bottom: 8px; font-size: 1.5em; }
        .controls { text-align: center; margin-bottom: 6px; }
        .controls button { background: linear-gradient(135deg, #e94560, #ff6b6b); border: none; padding: 5px 10px; border-radius: 12px; color: white; font-weight: bold; margin: 2px; cursor: pointer; font-size: 12px; }
        .controls button.active { background: linear-gradient(135deg, #ff6b6b, #ffa500); box-shadow: 0 0 10px rgba(255,165,0,0.6); }
        .bg-controls { text-align: center; margin-bottom: 5px; }
        .bg-controls button { background: linear-gradient(135deg, #2d5a27, #4a8b3c); border: none; padding: 4px 8px; border-radius: 10px; color: white; margin: 2px; cursor: pointer; font-size: 11px; }
        .bg-controls button.active { box-shadow: 0 0 8px rgba(74,139,60,0.8); }
        .main-canvas-container { display: flex; justify-content: center; margin: 8px auto; }
        #mainCanvas { border-radius: 14px; box-shadow: 0 5px 20px rgba(0,0,0,0.4); }
        .pet-selector { text-align: center; margin-top: 8px; display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; }
        .pet-selector button { background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); padding: 5px 10px; border-radius: 10px; color: #fff; cursor: pointer; font-size: 11px; }
        .pet-selector button.active { background: rgba(233,69,96,0.4); border-color: #e94560; }
    </style>
</head>
<body>
    <h1>🎬 Мультяшные Питомцы</h1>
    <div class="controls">
        <button onclick="setBehavior('idle')" id="beh-idle" class="active">😊 Отдых</button>
        <button onclick="setBehavior('walk')" id="beh-walk">🚶 Гулять</button>
        <button onclick="setBehavior('run')" id="beh-run">🏃 Бегать</button>
        <button onclick="setBehavior('sleep')" id="beh-sleep">😴 Спать</button>
        <button onclick="setBehavior('play')" id="beh-play">🎾 Играть</button>
        <button onclick="setBehavior('auto')" id="beh-auto">🤖 Авто</button>
    </div>
    <div class="bg-controls">
        <button onclick="setBackground('forest')" id="bg-forest" class="active">🌲Лес</button>
        <button onclick="setBackground('beach')" id="bg-beach">🏖️Пляж</button>
        <button onclick="setBackground('park')" id="bg-park">🌳Парк</button>
        <button onclick="setBackground('night')" id="bg-night">🌙Ночь</button>
        <button onclick="setBackground('snow')" id="bg-snow">❄️Снег</button>
        <button onclick="setBackground('rain')" id="bg-rain">🌧️Дождь</button>
        <button onclick="setBackground('storm')" id="bg-storm">⛈️Гроза</button>
    </div>
    <div class="bg-controls">
        <span style="color:#ffa">👑</span>
        <button onclick="setItem('hat','👑')">👑</button>
        <button onclick="setItem('hat','🎩')">🎩</button>
        <button onclick="setItem('hat','🎀')">🎀</button>
        <button onclick="setItem('hat','🥳')">🥳</button>
        <button onclick="setItem('hat','🌺')">🌺</button>
        <button onclick="setItem('hat','👓')">👓</button>
        <button onclick="setItem('hat','🕶️')">🕶️</button>
        <button onclick="setItem('hat','🧢')">🧢</button>
        <button onclick="setItem('hat','⛑️')">⛑️</button>
        <span style="color:#f88; margin-left:6px;">🧣</span>
        <button onclick="setItem('clothing','🧣')">🧣</button>
        <button onclick="setItem('clothing','bowtie')">🎀</button>
        <button onclick="setItem('clothing','collar')">💍</button>
        <button onclick="setItem('clothing','🧥')">🧥</button>
        <button onclick="setItem('clothing','🥼')">🥼</button>
        <span style="color:#8cf; margin-left:6px;">🎒</span>
        <button onclick="setItem('back','🎒')">🎒</button>
        <button onclick="setItem('back','🪶')">🪶</button>
        <button onclick="setItem('back','cape')">🦸</button>
        <button onclick="setItem('accessory','☂️')">☂️</button>
        <button onclick="setItem('accessory','⌚')">⌚</button>
        <button onclick="setItem('accessory','🌟')">🌟</button>
        <button onclick="clearItems()" style="background:#c33;">❌</button>
        <span style="margin-left:10px; color:#f8f;">💕</span>
        <button onclick="toggleBreeding()" id="breedBtn" style="background:linear-gradient(135deg,#ec407a,#d81b60);">🧬</button>
    </div>
    <div class="bg-controls" id="breedingPanel" style="display:none;">
        <span style="color:#f8f;">Мама:</span>
        <select id="parent1" onchange="updateBreeding()" style="padding:4px;border-radius:8px;"></select>
        <span style="color:#88f; margin-left:8px;">Папа:</span>
        <select id="parent2" onchange="updateBreeding()" style="padding:4px;border-radius:8px;"></select>
        <button onclick="breedPets()" style="background:linear-gradient(135deg,#e91e63,#c2185b); margin-left:8px;">💖 Скрестить!</button>
    </div>
    <div class="main-canvas-container">
        <canvas id="mainCanvas" width="600" height="380"></canvas>
    </div>
    <div class="pet-selector" id="petSelector"></div>

<script>
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
const groundY = canvas.height * 0.80;
let frame = 0, currentPet = 'kitty', currentBg = 'forest', currentBehavior = 'idle';

const pet = { x: 300, targetX: 300, dir: 1, legPhase: 0, sleepCurl: 0, jumpY: 0, timer: 0 };
const equipped = { hat: null, clothing: null, accessory: null, back: null };
let hybridMode = false;
let hybridGenes = null; // { parent1, parent2, mixRatio, color }
const toys = [
    { x: 150, y: groundY + 5, vx: 0, color: '#FF6B6B', r: 10 },
    { x: 450, y: groundY + 5, vx: 0, color: '#4ECDC4', r: 8 }
];

const PETS = {
    kitty:     { name: '🐱 Котёнок',   main: '#F5C89A', light: '#FFECD2', dark: '#D4A574', belly: '#FFF5E6', nose: '#FFB5B5', eye: '#5DA3A8', inner: '#FFCECE' },
    puppy:     { name: '🐶 Щенок',     main: '#C4A67A', light: '#E8D4B8', dark: '#8B7245', belly: '#F5E6D3', nose: '#3D2B1F', eye: '#6B4423', inner: '#D4A574', spots: '#8B6914' },
    bunny:     { name: '🐰 Зайка',     main: '#F8F8F8', light: '#FFFFFF', dark: '#E0D8D8', belly: '#FFFFFF', nose: '#FFB6C1', eye: '#FF6B8A', inner: '#FFCECE' },
    hamster:   { name: '🐹 Хомяк',     main: '#FFE4C4', light: '#FFF5EB', dark: '#D4B088', belly: '#FFF8F0', nose: '#FF8FAB', eye: '#1A1A1A', inner: '#FFD0D0', cheeks: '#FFB6C1' },
    fox:       { name: '🦊 Лисёнок',   main: '#FF7F24', light: '#FFAA5C', dark: '#CC5500', belly: '#FFFFFF', nose: '#2D1810', eye: '#FFB300', inner: '#FFE4C4', socks: '#1A1A1A', tailTip: '#FFFFFF' },
    bear:      { name: '🐻 Мишка',     main: '#8B6914', light: '#A08030', dark: '#5A4008', belly: '#C4A060', nose: '#2D1810', eye: '#2D1810', inner: '#A08030', snout: '#C4A060' },
    panda:     { name: '🐼 Панда',     main: '#FFFFFF', light: '#FFFFFF', dark: '#E0E0E0', belly: '#FFFFFF', nose: '#1A1A1A', eye: '#1A1A1A', inner: '#FFD0D0', patches: '#1A1A1A' },
    frog:      { name: '🐸 Лягушка',   main: '#4CAF50', light: '#81C784', dark: '#2E7D32', belly: '#C8E6C9', nose: '#2E7D32', eye: '#FFD700', inner: '#81C784', spots: '#2E7D32' },
    penguin:   { name: '🐧 Пингвин',   main: '#2C3E50', light: '#34495E', dark: '#1A252F', belly: '#FFFFFF', nose: '#FF9800', eye: '#1A1A1A', inner: '#34495E', beak: '#FF9800', feet: '#FF9800' },
    owl:       { name: '🦉 Совёнок',   main: '#8D6E63', light: '#A1887F', dark: '#5D4037', belly: '#D7CCC8', nose: '#FF9800', eye: '#FFD700', inner: '#BCAAA4', beak: '#FF9800' },
    turtle:    { name: '🐢 Черепаха',  main: '#4CAF50', light: '#81C784', dark: '#2E7D32', belly: '#FFF8E1', nose: '#5D4037', eye: '#1A1A1A', inner: '#A5D6A7', shell: '#8D6E63', shellDark: '#5D4037' },
    duck:      { name: '🦆 Утёнок',    main: '#FFEB3B', light: '#FFF59D', dark: '#FBC02D', belly: '#FFF8E1', nose: '#FF9800', eye: '#1A1A1A', inner: '#FFF59D', beak: '#FF9800', wing: '#FFD54F' }
};

// Create pet buttons
const selector = document.getElementById('petSelector');
Object.entries(PETS).forEach(([k, v]) => {
    const btn = document.createElement('button');
    btn.textContent = v.name;
    btn.onclick = () => { currentPet = k; document.querySelectorAll('.pet-selector button').forEach(b => b.classList.remove('active')); btn.classList.add('active'); };
    if (k === currentPet) btn.classList.add('active');
    selector.appendChild(btn);
});

// ========== BACKGROUNDS ==========
function drawBackground() {
    const bgs = {
        forest: { sky: ['#87CEEB','#E0F6FF'], ground: '#4a8b3c', grass: '#5da34d', trees: true },
        beach:  { sky: ['#87CEEB','#FFF5E6'], ground: '#F4D03F', grass: '#E8C83C', water: true },
        park:   { sky: ['#87CEEB','#B0E0E6'], ground: '#7CBA6D', grass: '#8FD47E', flowers: true },
        night:  { sky: ['#0C1445','#1a237e'], ground: '#1a3a1a', grass: '#254025', stars: true, fireflies: true },
        snow:   { sky: ['#B0C4DE','#E8E8E8'], ground: '#F0F8FF', grass: '#E8F4F8', snowfall: true, snowman: true },
        rain:   { sky: ['#607D8B','#90A4AE'], ground: '#3d6b35', grass: '#4a7a42', rain: true, puddles: true, clouds: true },
        storm:  { sky: ['#37474F','#455A64'], ground: '#2d5a27', grass: '#3d6b35', rain: true, lightning: true, clouds: true, wind: true }
    };
    const bg = bgs[currentBg];
    
    // Sky
    const skyG = ctx.createLinearGradient(0, 0, 0, groundY);
    skyG.addColorStop(0, bg.sky[0]); skyG.addColorStop(1, bg.sky[1]);
    ctx.fillStyle = skyG; ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Stars
    if (bg.stars) {
        ctx.fillStyle = '#FFF';
        for (let i = 0; i < 40; i++) {
            const tw = Math.sin(frame * 0.05 + i) * 0.5 + 0.5;
            ctx.globalAlpha = 0.3 + tw * 0.7;
            ctx.beginPath(); ctx.arc((i * 41) % canvas.width, (i * 29) % (groundY * 0.6), 1 + tw, 0, Math.PI * 2); ctx.fill();
        }
        ctx.globalAlpha = 1;
        // Moon
        ctx.fillStyle = '#F5F5DC'; ctx.beginPath(); ctx.arc(canvas.width * 0.85, 50, 25, 0, Math.PI * 2); ctx.fill();
    }
    
    // Sun
    if (!bg.stars) {
        const sx = currentBg === 'snow' ? 80 : canvas.width - 80;
        ctx.fillStyle = '#FFE87C'; ctx.beginPath(); ctx.arc(sx, 50, 30, 0, Math.PI * 2); ctx.fill();
        const sunG = ctx.createRadialGradient(sx, 50, 30, sx, 50, 60);
        sunG.addColorStop(0, 'rgba(255,232,124,0.4)'); sunG.addColorStop(1, 'transparent');
        ctx.fillStyle = sunG; ctx.beginPath(); ctx.arc(sx, 50, 60, 0, Math.PI * 2); ctx.fill();
    }
    
    // Clouds
    if (!bg.stars) {
        ctx.fillStyle = 'rgba(255,255,255,0.85)';
        for (let i = 0; i < 3; i++) {
            const cx = ((i * 200 + frame * 0.1) % (canvas.width + 100)) - 50;
            ctx.beginPath();
            ctx.arc(cx, 60 + i * 20, 20, 0, Math.PI * 2);
            ctx.arc(cx + 25, 55 + i * 20, 25, 0, Math.PI * 2);
            ctx.arc(cx + 50, 60 + i * 20, 18, 0, Math.PI * 2);
            ctx.fill();
        }
    }
    
    // Water
    if (bg.water) {
        const wy = groundY - 30;
        const wG = ctx.createLinearGradient(0, wy, 0, groundY);
        wG.addColorStop(0, '#87CEEB'); wG.addColorStop(1, '#40E0D0');
        ctx.fillStyle = wG; ctx.fillRect(0, wy, canvas.width, 30);
        ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1.5;
        for (let i = 0; i < 3; i++) {
            ctx.beginPath();
            for (let x = 0; x < canvas.width; x += 8) {
                const y = wy + 8 + i * 8 + Math.sin((x + frame * 2) * 0.04) * 3;
                x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.stroke();
        }
    }
    
    // Ground
    ctx.fillStyle = bg.ground; ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
    
    // Grass
    ctx.strokeStyle = bg.grass; ctx.lineWidth = 1.5;
    for (let i = 0; i < 60; i++) {
        const gx = (i * 11) % canvas.width;
        const sway = Math.sin(frame * 0.03 + i * 0.5) * 2;
        ctx.beginPath(); ctx.moveTo(gx, groundY);
        ctx.quadraticCurveTo(gx + sway, groundY - 10, gx + sway * 1.5, groundY - 16);
        ctx.stroke();
    }
    
    // Trees
    if (bg.trees) {
        [[40, 0.9], [canvas.width - 40, 0.85]].forEach(([tx, sc]) => {
            ctx.fillStyle = '#5D4037'; ctx.fillRect(tx - 8, groundY - 50 * sc, 16, 55 * sc);
            ctx.fillStyle = '#2E7D32';
            ctx.beginPath(); ctx.moveTo(tx, groundY - 110 * sc); ctx.lineTo(tx - 35 * sc, groundY - 40 * sc); ctx.lineTo(tx + 35 * sc, groundY - 40 * sc); ctx.fill();
            ctx.beginPath(); ctx.moveTo(tx, groundY - 130 * sc); ctx.lineTo(tx - 28 * sc, groundY - 75 * sc); ctx.lineTo(tx + 28 * sc, groundY - 75 * sc); ctx.fill();
        });
    }
    
    // Flowers
    if (bg.flowers) {
        const cols = ['#FF6B6B', '#FFE66D', '#4ECDC4', '#FF8ED4', '#A78BFA'];
        for (let i = 0; i < 12; i++) {
            const fx = 60 + (i * 48) % (canvas.width - 120);
            const sway = Math.sin(frame * 0.025 + i) * 1.5;
            ctx.strokeStyle = '#4A8B3C'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(fx, groundY + 5); ctx.lineTo(fx + sway, groundY - 8); ctx.stroke();
            ctx.fillStyle = cols[i % cols.length]; ctx.beginPath(); ctx.arc(fx + sway, groundY - 12, 6, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#FFE87C'; ctx.beginPath(); ctx.arc(fx + sway, groundY - 12, 2.5, 0, Math.PI * 2); ctx.fill();
        }
    }
    
    // Snowman
    if (bg.snowman) {
        const sx = 100;
        ctx.fillStyle = '#FFF';
        ctx.beginPath(); ctx.arc(sx, groundY - 15, 22, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(sx, groundY - 48, 16, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(sx, groundY - 72, 11, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#FF6B00'; ctx.beginPath(); ctx.moveTo(sx, groundY - 72); ctx.lineTo(sx + 15, groundY - 70); ctx.lineTo(sx, groundY - 68); ctx.fill();
        ctx.fillStyle = '#1A1A1A';
        ctx.beginPath(); ctx.arc(sx - 4, groundY - 76, 2, 0, Math.PI * 2); ctx.arc(sx + 4, groundY - 76, 2, 0, Math.PI * 2); ctx.fill();
    }
    
    // Fireflies
    if (bg.fireflies) {
        for (let i = 0; i < 12; i++) {
            const fx = 50 + (i * 50 + Math.sin(frame * 0.02 + i) * 30) % (canvas.width - 100);
            const fy = groundY * 0.5 + Math.cos(frame * 0.025 + i * 2) * 40;
            const glow = Math.sin(frame * 0.1 + i * 1.5) * 0.5 + 0.5;
            const fG = ctx.createRadialGradient(fx, fy, 0, fx, fy, 12);
            fG.addColorStop(0, `rgba(255,255,100,${glow})`); fG.addColorStop(1, 'transparent');
            ctx.fillStyle = fG; ctx.beginPath(); ctx.arc(fx, fy, 12, 0, Math.PI * 2); ctx.fill();
        }
    }
    
    // Snowfall
    if (bg.snowfall) {
        ctx.fillStyle = '#FFF';
        for (let i = 0; i < 40; i++) {
            const sx = (i * 17 + frame * 0.3) % canvas.width;
            const sy = (i * 23 + frame * 0.8) % canvas.height;
            ctx.globalAlpha = 0.5 + (i % 4) * 0.1;
            ctx.beginPath(); ctx.arc(sx, sy, 2 + (i % 3), 0, Math.PI * 2); ctx.fill();
        }
        ctx.globalAlpha = 1;
    }
    
    // Dark clouds for rain/storm
    if (bg.clouds) {
        ctx.fillStyle = 'rgba(80,80,90,0.85)';
        for (let i = 0; i < 5; i++) {
            const cx = ((i * 150 + frame * 0.15) % (canvas.width + 150)) - 75;
            const cy = 40 + i * 15;
            const s = 1.2 + (i % 2) * 0.3;
            ctx.beginPath();
            ctx.arc(cx, cy, 30 * s, 0, Math.PI * 2);
            ctx.arc(cx + 35 * s, cy - 5, 35 * s, 0, Math.PI * 2);
            ctx.arc(cx + 70 * s, cy, 28 * s, 0, Math.PI * 2);
            ctx.arc(cx + 35 * s, cy + 10, 25 * s, 0, Math.PI * 2);
            ctx.fill();
        }
    }
    
    // Rain
    if (bg.rain) {
        const windOffset = bg.wind ? Math.sin(frame * 0.02) * 30 : 0;
        ctx.strokeStyle = 'rgba(180,200,220,0.6)';
        ctx.lineWidth = bg.wind ? 2 : 1.5;
        for (let i = 0; i < 80; i++) {
            const rx = (i * 9 + frame * (bg.wind ? 3 : 1.5) + windOffset) % canvas.width;
            const ry = (i * 17 + frame * (bg.wind ? 8 : 5)) % canvas.height;
            const len = bg.wind ? 25 : 18;
            ctx.beginPath();
            ctx.moveTo(rx, ry);
            ctx.lineTo(rx + (bg.wind ? 8 : 2), ry + len);
            ctx.stroke();
        }
    }
    
    // Puddles
    if (bg.puddles) {
        ctx.fillStyle = 'rgba(100,130,160,0.4)';
        for (let i = 0; i < 6; i++) {
            const px = 50 + (i * 100) % (canvas.width - 100);
            const ripple = Math.sin(frame * 0.1 + i) * 2;
            ctx.beginPath();
            ctx.ellipse(px, groundY + 15, 25 + ripple, 6 + ripple * 0.3, 0, 0, Math.PI * 2);
            ctx.fill();
            // Ripples
            ctx.strokeStyle = 'rgba(150,180,200,0.5)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.ellipse(px, groundY + 15, 12 + Math.sin(frame * 0.15 + i) * 8, 3, 0, 0, Math.PI * 2);
            ctx.stroke();
        }
    }
    
    // Lightning
    if (bg.lightning && Math.random() < 0.008) {
        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
    if (bg.lightning && frame % 150 < 3) {
        // Lightning bolt
        const lx = 100 + Math.random() * (canvas.width - 200);
        ctx.strokeStyle = '#FFFFE0';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(lx, 60);
        let ly = 60;
        for (let i = 0; i < 6; i++) {
            ly += 30 + Math.random() * 20;
            ctx.lineTo(lx + (Math.random() - 0.5) * 40, ly);
        }
        ctx.stroke();
        // Glow
        ctx.strokeStyle = 'rgba(200,200,255,0.5)';
        ctx.lineWidth = 8;
        ctx.stroke();
    }
}

// ========== TOYS ==========
function drawToys() {
    toys.forEach(t => {
        const tG = ctx.createRadialGradient(t.x - 3, t.y - 3, 0, t.x, t.y, t.r);
        tG.addColorStop(0, '#FFF'); tG.addColorStop(0.4, t.color); tG.addColorStop(1, t.color);
        ctx.fillStyle = tG; ctx.beginPath(); ctx.arc(t.x, t.y, t.r, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 1; ctx.stroke();
        t.x += t.vx; t.vx *= 0.96;
        t.x = Math.max(30, Math.min(canvas.width - 30, t.x));
    });
}

// ========== BEHAVIOR ==========
let autoB = 'idle', autoT = 0;
function updatePet() {
    const b = currentBehavior === 'auto' ? getAuto() : currentBehavior;
    pet.sleepCurl = Math.max(0, pet.sleepCurl + (b === 'sleep' ? 0.03 : -0.05));
    
    if (b === 'walk' || b === 'run' || b === 'play') {
        if (Math.abs(pet.x - pet.targetX) < 10) pet.targetX = 100 + Math.random() * (canvas.width - 200);
        pet.dir = pet.targetX > pet.x ? 1 : -1;
        const spd = b === 'run' ? 3 : b === 'play' ? 1.8 : 1.2;
        pet.x += pet.dir * spd;
        pet.legPhase += spd * 0.1;
        pet.jumpY = b === 'run' ? Math.abs(Math.sin(pet.legPhase)) * 12 : 0;
    }
    
    if (b === 'play') {
        pet.timer++;
        if (pet.timer % 80 === 0) {
            const near = toys.reduce((a, c) => Math.abs(c.x - pet.x) < Math.abs(a.x - pet.x) ? c : a);
            if (Math.abs(near.x - pet.x) < 50) { near.vx = (Math.random() - 0.5) * 20; pet.jumpY = 15; }
        }
        const cl = toys.reduce((a, c) => Math.abs(c.x - pet.x) < Math.abs(a.x - pet.x) ? c : a);
        pet.targetX = cl.x;
    }
    
    if (pet.jumpY > 0 && b !== 'run') pet.jumpY = Math.max(0, pet.jumpY - 1);
    pet.x = Math.max(80, Math.min(canvas.width - 80, pet.x));
}

function getAuto() {
    autoT++;
    if (autoT > 200 + Math.random() * 150) {
        autoT = 0;
        const bs = ['idle', 'walk', 'walk', 'run', 'play', 'sleep'];
        autoB = bs[Math.floor(Math.random() * bs.length)];
    }
    return autoB;
}

// ========== HELPER FUNCTIONS ==========
function grad(x, y, r, p) {
    const g = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, 0, x, y, r);
    g.addColorStop(0, p.light); g.addColorStop(0.6, p.main); g.addColorStop(1, p.dark);
    return g;
}

function drawEye(x, y, r, p, sleeping) {
    if (sleeping) {
        ctx.strokeStyle = '#333'; ctx.lineWidth = 2; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.arc(x, y, r * 0.6, 0.1, Math.PI - 0.1); ctx.stroke();
        return;
    }
    // White
    ctx.fillStyle = '#FFF'; ctx.beginPath(); ctx.ellipse(x, y, r, r * 1.2, 0, 0, Math.PI * 2); ctx.fill();
    // Iris
    const iG = ctx.createRadialGradient(x, y - 1, 0, x, y, r * 0.7);
    iG.addColorStop(0, p.eye); iG.addColorStop(0.8, p.eye); iG.addColorStop(1, '#222');
    ctx.fillStyle = iG; ctx.beginPath(); ctx.arc(x, y, r * 0.7, 0, Math.PI * 2); ctx.fill();
    // Pupil
    ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(x, y + 1, r * 0.35, 0, Math.PI * 2); ctx.fill();
    // Highlight
    ctx.fillStyle = '#FFF'; ctx.beginPath(); ctx.arc(x + r * 0.2, y - r * 0.25, r * 0.22, 0, Math.PI * 2); ctx.fill();
}

function drawNose(x, y, size, color) {
    const nG = ctx.createRadialGradient(x - 2, y - 2, 0, x, y, size);
    nG.addColorStop(0, '#FFF'); nG.addColorStop(0.3, color); nG.addColorStop(1, '#333');
    ctx.fillStyle = nG;
    ctx.beginPath(); ctx.moveTo(x, y - size); ctx.quadraticCurveTo(x + size * 1.2, y, x, y + size * 0.8);
    ctx.quadraticCurveTo(x - size * 1.2, y, x, y - size); ctx.fill();
}

// ========== UNIQUE PET DRAWINGS ==========
function drawPet() {
    const p = hybridMode ? getHybridPalette() : PETS[currentPet];
    const sleeping = pet.sleepCurl > 0.5;
    const legOff = Math.sin(pet.legPhase) * 5;
    const breathe = Math.sin(frame * 0.05) * 2;
    
    ctx.save();
    ctx.translate(pet.x, groundY - pet.jumpY);
    if (pet.sleepCurl > 0) { ctx.scale(1 + pet.sleepCurl * 0.3, 1 - pet.sleepCurl * 0.4); ctx.translate(0, pet.sleepCurl * 15); }
    ctx.scale(pet.dir, 1);
    ctx.translate(0, breathe);
    
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.15)'; ctx.beginPath(); ctx.ellipse(0, 5 + pet.jumpY, 30, 10, 0, 0, Math.PI * 2); ctx.fill();
    
    // Draw BACK items first (cape, wings, backpack)
    drawBackItems();
    
    switch (currentPet) {
        case 'kitty': drawKitty(p, sleeping, legOff); break;
        case 'puppy': drawPuppy(p, sleeping, legOff); break;
        case 'bunny': drawBunny(p, sleeping, legOff); break;
        case 'hamster': drawHamster(p, sleeping, legOff); break;
        case 'fox': drawFox(p, sleeping, legOff); break;
        case 'bear': drawBear(p, sleeping, legOff); break;
        case 'panda': drawPanda(p, sleeping, legOff); break;
        case 'frog': drawFrog(p, sleeping, legOff); break;
        case 'penguin': drawPenguin(p, sleeping, legOff); break;
        case 'owl': drawOwl(p, sleeping, legOff); break;
        case 'turtle': drawTurtle(p, sleeping, legOff); break;
        case 'duck': drawDuck(p, sleeping, legOff); break;
    }
    
    // Draw FRONT items (hat, clothing, accessories)
    drawFrontItems();
    
    ctx.restore();
}

// ===== KITTY - Sleek, graceful, pointed ears =====
function drawKitty(p, sleep, leg) {
    // Tail
    ctx.save(); ctx.translate(18, -15);
    ctx.rotate(Math.sin(frame * 0.06) * 0.4);
    ctx.fillStyle = grad(5, -20, 12, p);
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.quadraticCurveTo(20, -15, 12, -40); ctx.quadraticCurveTo(5, -42, 2, -38); ctx.quadraticCurveTo(12, -18, 0, 0); ctx.fill();
    ctx.restore();
    
    // Back legs
    ctx.fillStyle = p.dark;
    ctx.beginPath(); ctx.ellipse(-10 - leg, 0, 8, 6, 0, 0, Math.PI * 2); ctx.ellipse(8 + leg, 0, 8, 6, 0, 0, Math.PI * 2); ctx.fill();
    
    // Body - sleek oval
    ctx.fillStyle = grad(0, -18, 24, p);
    ctx.beginPath(); ctx.ellipse(0, -18, 22, 18, 0, 0, Math.PI * 2); ctx.fill();
    
    // Belly
    ctx.fillStyle = p.belly; ctx.globalAlpha = 0.5;
    ctx.beginPath(); ctx.ellipse(0, -14, 12, 10, 0, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
    
    // Front legs
    ctx.fillStyle = p.dark;
    ctx.beginPath(); ctx.ellipse(-8 + leg, -2, 6, 5, 0, 0, Math.PI * 2); ctx.ellipse(8 - leg, -2, 6, 5, 0, 0, Math.PI * 2); ctx.fill();
    
    // Head
    ctx.fillStyle = grad(0, -42, 20, p);
    ctx.beginPath(); ctx.arc(0, -42, 18, 0, Math.PI * 2); ctx.fill();
    
    // Pointed ears
    [[-12, -55], [12, -55]].forEach(([ex, ey]) => {
        ctx.fillStyle = grad(ex, ey, 10, p);
        ctx.beginPath(); ctx.moveTo(ex - 8, ey + 12); ctx.lineTo(ex, ey - 8); ctx.lineTo(ex + 8, ey + 12); ctx.fill();
        ctx.fillStyle = p.inner;
        ctx.beginPath(); ctx.moveTo(ex - 4, ey + 8); ctx.lineTo(ex, ey); ctx.lineTo(ex + 4, ey + 8); ctx.fill();
    });
    
    // Face
    drawEye(-7, -44, 5, p, sleep);
    drawEye(7, -44, 5, p, sleep);
    drawNose(0, -36, 4, p.nose);
    
    // Mouth
    ctx.strokeStyle = '#6B5A4A'; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(-4, -32); ctx.quadraticCurveTo(0, -30, 4, -32); ctx.stroke();
    
    // Whiskers
    ctx.strokeStyle = '#888'; ctx.lineWidth = 0.8;
    [[-1, 0, 1]].flat().forEach(i => {
        ctx.beginPath(); ctx.moveTo(-10, -36 + i * 3); ctx.lineTo(-28, -38 + i * 4); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(10, -36 + i * 3); ctx.lineTo(28, -38 + i * 4); ctx.stroke();
    });
    
    // Blush
    ctx.fillStyle = 'rgba(255,150,180,0.3)';
    ctx.beginPath(); ctx.ellipse(-14, -38, 5, 3, 0, 0, Math.PI * 2); ctx.ellipse(14, -38, 5, 3, 0, 0, Math.PI * 2); ctx.fill();
}

// ===== PUPPY - Floppy ears, longer snout =====
function drawPuppy(p, sleep, leg) {
    // Tail - short, wagging
    ctx.save(); ctx.translate(20, -20);
    ctx.rotate(Math.sin(frame * 0.15) * 0.5);
    ctx.fillStyle = p.main;
    ctx.beginPath(); ctx.ellipse(8, -5, 8, 5, 0.5, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    
    // Back legs
    ctx.fillStyle = p.dark;
    ctx.beginPath(); ctx.ellipse(-12 - leg, 0, 9, 7, 0, 0, Math.PI * 2); ctx.ellipse(10 + leg, 0, 9, 7, 0, 0, Math.PI * 2); ctx.fill();
    
    // Body - rounder
    ctx.fillStyle = grad(0, -20, 26, p);
    ctx.beginPath(); ctx.ellipse(0, -20, 24, 20, 0, 0, Math.PI * 2); ctx.fill();
    
    // Belly
    ctx.fillStyle = p.belly; ctx.globalAlpha = 0.5;
    ctx.beginPath(); ctx.ellipse(0, -15, 14, 12, 0, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
    
    // Spot on back
    ctx.fillStyle = p.spots; ctx.globalAlpha = 0.6;
    ctx.beginPath(); ctx.ellipse(8, -28, 8, 6, 0.3, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
    
    // Front legs
    ctx.fillStyle = p.dark;
    ctx.beginPath(); ctx.ellipse(-10 + leg, -3, 7, 6, 0, 0, Math.PI * 2); ctx.ellipse(10 - leg, -3, 7, 6, 0, 0, Math.PI * 2); ctx.fill();
    
    // Head - rounder
    ctx.fillStyle = grad(0, -46, 20, p);
    ctx.beginPath(); ctx.ellipse(0, -46, 20, 18, 0, 0, Math.PI * 2); ctx.fill();
    
    // Snout
    ctx.fillStyle = p.belly;
    ctx.beginPath(); ctx.ellipse(0, -38, 10, 8, 0, 0, Math.PI * 2); ctx.fill();
    
    // Floppy ears
    ctx.fillStyle = p.spots || p.dark;
    ctx.beginPath(); ctx.ellipse(-18, -42, 8, 14, -0.3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(18, -42, 8, 14, 0.3, 0, Math.PI * 2); ctx.fill();
    
    // Face
    drawEye(-8, -50, 5, p, sleep);
    drawEye(8, -50, 5, p, sleep);
    drawNose(0, -38, 5, p.nose);
    
    // Tongue
    if (!sleep && Math.sin(frame * 0.1) > 0.3) {
        ctx.fillStyle = '#FF8080';
        ctx.beginPath(); ctx.ellipse(3, -30, 4, 6, 0.2, 0, Math.PI * 2); ctx.fill();
    }
    
    // Mouth
    ctx.strokeStyle = '#5A4A3A'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(-5, -33); ctx.quadraticCurveTo(0, -30, 5, -33); ctx.stroke();
}

// ===== BUNNY - Long ears, round fluffy body =====
function drawBunny(p, sleep, leg) {
    // Fluffy tail
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.arc(18, -12, 10, 0, Math.PI * 2); ctx.fill();
    
    // Back legs - big and powerful
    ctx.fillStyle = p.dark;
    ctx.beginPath(); ctx.ellipse(-14 - leg * 0.5, 0, 12, 8, -0.2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(10 + leg * 0.5, 0, 12, 8, 0.2, 0, Math.PI * 2); ctx.fill();
    
    // Body - round and fluffy
    ctx.fillStyle = grad(0, -20, 26, p);
    ctx.beginPath(); ctx.ellipse(0, -20, 24, 22, 0, 0, Math.PI * 2); ctx.fill();
    
    // Front paws
    ctx.fillStyle = p.dark;
    ctx.beginPath(); ctx.ellipse(-8 + leg, -4, 6, 5, 0, 0, Math.PI * 2); ctx.ellipse(8 - leg, -4, 6, 5, 0, 0, Math.PI * 2); ctx.fill();
    
    // Head
    ctx.fillStyle = grad(0, -48, 18, p);
    ctx.beginPath(); ctx.arc(0, -48, 16, 0, Math.PI * 2); ctx.fill();
    
    // Long ears!
    const earSway = Math.sin(frame * 0.04) * 0.1;
    [[-10, -1], [10, 1]].forEach(([ex, dir]) => {
        ctx.save();
        ctx.translate(ex, -60);
        ctx.rotate(earSway * dir);
        ctx.fillStyle = grad(0, -15, 10, p);
        ctx.beginPath(); ctx.ellipse(0, -15, 7, 22, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = p.inner;
        ctx.beginPath(); ctx.ellipse(0, -12, 4, 16, 0, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    });
    
    // Face
    drawEye(-6, -50, 5, p, sleep);
    drawEye(6, -50, 5, p, sleep);
    
    // Pink nose - twitching
    const twitch = Math.sin(frame * 0.2) * 1;
    ctx.fillStyle = p.nose;
    ctx.beginPath(); ctx.ellipse(0 + twitch, -42, 4, 3, 0, 0, Math.PI * 2); ctx.fill();
    
    // Mouth - Y shape
    ctx.strokeStyle = '#888'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(0, -40); ctx.lineTo(0, -37);
    ctx.moveTo(-3, -35); ctx.lineTo(0, -37); ctx.lineTo(3, -35); ctx.stroke();
    
    // Cheek fluff
    ctx.fillStyle = p.main;
    ctx.beginPath(); ctx.ellipse(-14, -44, 6, 5, 0, 0, Math.PI * 2); ctx.ellipse(14, -44, 6, 5, 0, 0, Math.PI * 2); ctx.fill();
}

// ===== HAMSTER - Chubby with big cheeks =====
function drawHamster(p, sleep, leg) {
    // Tiny tail
    ctx.fillStyle = p.main;
    ctx.beginPath(); ctx.arc(16, -12, 4, 0, Math.PI * 2); ctx.fill();
    
    // Little legs
    ctx.fillStyle = p.dark;
    ctx.beginPath();
    ctx.ellipse(-10 - leg * 0.3, 0, 6, 4, 0, 0, Math.PI * 2);
    ctx.ellipse(10 + leg * 0.3, 0, 6, 4, 0, 0, Math.PI * 2);
    ctx.ellipse(-6 + leg * 0.3, -2, 5, 4, 0, 0, Math.PI * 2);
    ctx.ellipse(6 - leg * 0.3, -2, 5, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Chubby body
    ctx.fillStyle = grad(0, -18, 24, p);
    ctx.beginPath(); ctx.ellipse(0, -18, 22, 20, 0, 0, Math.PI * 2); ctx.fill();
    
    // White belly
    ctx.fillStyle = p.belly; ctx.globalAlpha = 0.6;
    ctx.beginPath(); ctx.ellipse(0, -12, 14, 12, 0, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
    
    // Head - very round
    ctx.fillStyle = grad(0, -42, 20, p);
    ctx.beginPath(); ctx.arc(0, -42, 18, 0, Math.PI * 2); ctx.fill();
    
    // HUGE cheeks!
    ctx.fillStyle = p.cheeks;
    ctx.beginPath(); ctx.ellipse(-16, -38, 10, 8, 0, 0, Math.PI * 2); ctx.ellipse(16, -38, 10, 8, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = p.light;
    ctx.beginPath(); ctx.ellipse(-16, -38, 8, 6, 0, 0, Math.PI * 2); ctx.ellipse(16, -38, 8, 6, 0, 0, Math.PI * 2); ctx.fill();
    
    // Tiny round ears
    ctx.fillStyle = p.main;
    ctx.beginPath(); ctx.arc(-12, -56, 6, 0, Math.PI * 2); ctx.arc(12, -56, 6, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = p.inner;
    ctx.beginPath(); ctx.arc(-12, -56, 3, 0, Math.PI * 2); ctx.arc(12, -56, 3, 0, Math.PI * 2); ctx.fill();
    
    // Face
    drawEye(-6, -46, 4, p, sleep);
    drawEye(6, -46, 4, p, sleep);
    drawNose(0, -38, 3, p.nose);
    
    // Tiny mouth
    ctx.strokeStyle = '#888'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(0, -35, 3, 0.2, Math.PI - 0.2); ctx.stroke();
}

// ===== FOX - Pointy snout, big tail with white tip =====
function drawFox(p, sleep, leg) {
    // Big fluffy tail with white tip
    ctx.save(); ctx.translate(20, -18);
    ctx.rotate(Math.sin(frame * 0.05) * 0.3);
    ctx.fillStyle = p.main;
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.quadraticCurveTo(30, -10, 35, -35);
    ctx.quadraticCurveTo(32, -42, 25, -38); ctx.quadraticCurveTo(20, -15, 0, 0); ctx.fill();
    ctx.fillStyle = p.tailTip;
    ctx.beginPath(); ctx.arc(30, -38, 8, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    
    // Black socks on legs
    ctx.fillStyle = p.socks;
    ctx.beginPath();
    ctx.ellipse(-12 - leg, 0, 7, 5, 0, 0, Math.PI * 2);
    ctx.ellipse(10 + leg, 0, 7, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Body
    ctx.fillStyle = grad(0, -20, 24, p);
    ctx.beginPath(); ctx.ellipse(0, -20, 22, 18, 0, 0, Math.PI * 2); ctx.fill();
    
    // White belly/chest
    ctx.fillStyle = p.belly;
    ctx.beginPath(); ctx.ellipse(0, -14, 12, 10, 0, 0, Math.PI * 2); ctx.fill();
    
    // Front legs with socks
    ctx.fillStyle = p.socks;
    ctx.beginPath(); ctx.ellipse(-8 + leg, -2, 6, 5, 0, 0, Math.PI * 2); ctx.ellipse(8 - leg, -2, 6, 5, 0, 0, Math.PI * 2); ctx.fill();
    
    // Head - triangular
    ctx.fillStyle = grad(0, -44, 20, p);
    ctx.beginPath();
    ctx.moveTo(0, -28); ctx.quadraticCurveTo(-22, -40, -18, -55);
    ctx.quadraticCurveTo(-10, -65, 0, -62); ctx.quadraticCurveTo(10, -65, 18, -55);
    ctx.quadraticCurveTo(22, -40, 0, -28); ctx.fill();
    
    // White cheeks
    ctx.fillStyle = p.belly;
    ctx.beginPath(); ctx.ellipse(-10, -40, 8, 6, 0, 0, Math.PI * 2); ctx.ellipse(10, -40, 8, 6, 0, 0, Math.PI * 2); ctx.fill();
    
    // Pointy ears
    [[-14, -58], [14, -58]].forEach(([ex, ey]) => {
        ctx.fillStyle = p.main;
        ctx.beginPath(); ctx.moveTo(ex - 6, ey + 8); ctx.lineTo(ex, ey - 12); ctx.lineTo(ex + 6, ey + 8); ctx.fill();
        ctx.fillStyle = p.inner;
        ctx.beginPath(); ctx.moveTo(ex - 3, ey + 5); ctx.lineTo(ex, ey - 5); ctx.lineTo(ex + 3, ey + 5); ctx.fill();
    });
    
    // Face
    drawEye(-8, -48, 5, p, sleep);
    drawEye(8, -48, 5, p, sleep);
    
    // Pointy snout
    ctx.fillStyle = p.belly;
    ctx.beginPath(); ctx.moveTo(-8, -38); ctx.quadraticCurveTo(0, -28, 8, -38); ctx.quadraticCurveTo(0, -42, -8, -38); ctx.fill();
    drawNose(0, -34, 4, p.nose);
    
    // Sly smile
    ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(-5, -32); ctx.quadraticCurveTo(0, -28, 5, -32); ctx.stroke();
}

// ===== BEAR - Stocky, round ears =====
function drawBear(p, sleep, leg) {
    // Small tail
    ctx.fillStyle = p.dark;
    ctx.beginPath(); ctx.arc(18, -15, 6, 0, Math.PI * 2); ctx.fill();
    
    // Stocky legs
    ctx.fillStyle = p.dark;
    ctx.beginPath();
    ctx.ellipse(-14 - leg * 0.5, 0, 10, 7, 0, 0, Math.PI * 2);
    ctx.ellipse(12 + leg * 0.5, 0, 10, 7, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Chunky body
    ctx.fillStyle = grad(0, -22, 28, p);
    ctx.beginPath(); ctx.ellipse(0, -22, 26, 22, 0, 0, Math.PI * 2); ctx.fill();
    
    // Lighter belly
    ctx.fillStyle = p.snout; ctx.globalAlpha = 0.5;
    ctx.beginPath(); ctx.ellipse(0, -16, 14, 12, 0, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
    
    // Front paws
    ctx.fillStyle = p.dark;
    ctx.beginPath(); ctx.ellipse(-10 + leg, -4, 8, 6, 0, 0, Math.PI * 2); ctx.ellipse(10 - leg, -4, 8, 6, 0, 0, Math.PI * 2); ctx.fill();
    
    // Head
    ctx.fillStyle = grad(0, -50, 22, p);
    ctx.beginPath(); ctx.ellipse(0, -50, 20, 18, 0, 0, Math.PI * 2); ctx.fill();
    
    // Round ears
    ctx.fillStyle = p.main;
    ctx.beginPath(); ctx.arc(-16, -64, 9, 0, Math.PI * 2); ctx.arc(16, -64, 9, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = p.inner;
    ctx.beginPath(); ctx.arc(-16, -64, 5, 0, Math.PI * 2); ctx.arc(16, -64, 5, 0, Math.PI * 2); ctx.fill();
    
    // Snout
    ctx.fillStyle = p.snout;
    ctx.beginPath(); ctx.ellipse(0, -42, 12, 10, 0, 0, Math.PI * 2); ctx.fill();
    
    // Face
    drawEye(-9, -54, 4, p, sleep);
    drawEye(9, -54, 4, p, sleep);
    drawNose(0, -42, 6, p.nose);
    
    // Mouth
    ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(0, -38); ctx.lineTo(0, -34);
    ctx.moveTo(-4, -32); ctx.quadraticCurveTo(0, -30, 4, -32); ctx.stroke();
}

// ===== PANDA - Black and white patches =====
function drawPanda(p, sleep, leg) {
    // Tiny tail
    ctx.fillStyle = p.patches;
    ctx.beginPath(); ctx.arc(18, -15, 5, 0, Math.PI * 2); ctx.fill();
    
    // Black legs
    ctx.fillStyle = p.patches;
    ctx.beginPath();
    ctx.ellipse(-14 - leg * 0.5, 0, 10, 7, 0, 0, Math.PI * 2);
    ctx.ellipse(12 + leg * 0.5, 0, 10, 7, 0, 0, Math.PI * 2);
    ctx.ellipse(-10 + leg, -4, 8, 6, 0, 0, Math.PI * 2);
    ctx.ellipse(10 - leg, -4, 8, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // White body
    ctx.fillStyle = grad(0, -22, 26, p);
    ctx.beginPath(); ctx.ellipse(0, -22, 24, 22, 0, 0, Math.PI * 2); ctx.fill();
    
    // Black shoulder patches
    ctx.fillStyle = p.patches;
    ctx.beginPath(); ctx.ellipse(-16, -28, 10, 12, -0.3, 0, Math.PI * 2); ctx.ellipse(16, -28, 10, 12, 0.3, 0, Math.PI * 2); ctx.fill();
    
    // White head
    ctx.fillStyle = grad(0, -52, 22, p);
    ctx.beginPath(); ctx.arc(0, -52, 20, 0, Math.PI * 2); ctx.fill();
    
    // Black ears
    ctx.fillStyle = p.patches;
    ctx.beginPath(); ctx.arc(-16, -68, 8, 0, Math.PI * 2); ctx.arc(16, -68, 8, 0, Math.PI * 2); ctx.fill();
    
    // Black eye patches!
    ctx.fillStyle = p.patches;
    ctx.beginPath(); ctx.ellipse(-10, -54, 9, 11, -0.2, 0, Math.PI * 2); ctx.ellipse(10, -54, 9, 11, 0.2, 0, Math.PI * 2); ctx.fill();
    
    // Eyes in the patches
    drawEye(-10, -54, 5, { eye: '#1A1A1A' }, sleep);
    drawEye(10, -54, 5, { eye: '#1A1A1A' }, sleep);
    
    // Nose and mouth
    drawNose(0, -44, 5, p.nose);
    ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(-4, -38); ctx.quadraticCurveTo(0, -35, 4, -38); ctx.stroke();
}

// ===== FROG - Big eyes, wide mouth, webbed feet =====
function drawFrog(p, sleep, leg) {
    // Back legs - powerful, bent
    ctx.fillStyle = p.dark;
    ctx.beginPath();
    ctx.ellipse(-18 - leg, -2, 14, 8, -0.4, 0, Math.PI * 2);
    ctx.ellipse(18 + leg, -2, 14, 8, 0.4, 0, Math.PI * 2);
    ctx.fill();
    // Webbed feet
    ctx.fillStyle = p.main;
    [[-25, 3], [25, 3]].forEach(([fx, fy]) => {
        ctx.beginPath();
        for (let i = 0; i < 3; i++) {
            ctx.moveTo(fx, fy); ctx.lineTo(fx + (i - 1) * 6, fy + 8);
        }
        ctx.fill();
    });
    
    // Squat body
    ctx.fillStyle = grad(0, -18, 28, p);
    ctx.beginPath(); ctx.ellipse(0, -18, 26, 16, 0, 0, Math.PI * 2); ctx.fill();
    
    // Light belly
    ctx.fillStyle = p.belly;

// ========== MAIN LOOP ==========
function animate() {
    frame++;
    updatePet();
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawBackground();
    drawToys();
    drawPet();
    
    // Hybrid mode indicator
    if (hybridMode && hybridGenes) {
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(10, 10, 180, 50);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 11px sans-serif';
        ctx.fillText('🧬 ГИБРИД:', 18, 26);
        ctx.font = '10px sans-serif';
        const p1 = PETS[hybridGenes.parent1]?.name || hybridGenes.parent1;
        const p2 = PETS[hybridGenes.parent2]?.name || hybridGenes.parent2;
        ctx.fillText(`${p1} + ${p2}`, 18, 40);
        // Show mixed color swatch
        ctx.fillStyle = hybridGenes.color;
        ctx.fillRect(150, 20, 30, 30);
        ctx.strokeStyle = '#fff';
        ctx.strokeRect(150, 20, 30, 30);
    }
    
    requestAnimationFrame(animate);
}

// ========== BREEDING SYSTEM ==========
function toggleBreeding() {
    const panel = document.getElementById('breedingPanel');
    const btn = document.getElementById('breedBtn');
    hybridMode = !hybridMode;
    panel.style.display = hybridMode ? 'block' : 'none';
    btn.style.boxShadow = hybridMode ? '0 0 15px #ff69b4' : 'none';
    if (hybridMode) populateParentSelectors();
    else { hybridGenes = null; }
}

function populateParentSelectors() {
    const sel1 = document.getElementById('parent1');
    const sel2 = document.getElementById('parent2');
    sel1.innerHTML = ''; sel2.innerHTML = '';
    Object.entries(PETS).forEach(([k, v]) => {
        sel1.innerHTML += `<option value="${k}">${v.name}</option>`;
        sel2.innerHTML += `<option value="${k}">${v.name}</option>`;
    });
    sel2.selectedIndex = 1;
    updateBreeding();
}

function updateBreeding() {
    const p1 = document.getElementById('parent1').value;
    const p2 = document.getElementById('parent2').value;
    if (p1 && p2) {
        // Mix colors from both parents
        const c1 = PETS[p1].main;
        const c2 = PETS[p2].main;
        const mixedColor = mixColors(c1, c2, 0.5);
        hybridGenes = { parent1: p1, parent2: p2, color: mixedColor };
    }
}

function breedPets() {
    if (!hybridGenes) return;
    // Random mix ratio for unique offspring
    const ratio = 0.3 + Math.random() * 0.4;
    const c1 = PETS[hybridGenes.parent1].main;
    const c2 = PETS[hybridGenes.parent2].main;
    hybridGenes.color = mixColors(c1, c2, ratio);
    hybridGenes.mixRatio = ratio;
    // Randomly pick dominant parent for body shape
    hybridGenes.dominant = Math.random() > 0.5 ? hybridGenes.parent1 : hybridGenes.parent2;
    currentPet = hybridGenes.dominant;
    // Update pet selector
    document.querySelectorAll('.pet-selector button').forEach(b => b.classList.remove('active'));
    // Visual feedback
    pet.jumpY = 20;
}

function mixColors(hex1, hex2, ratio) {
    const r1 = parseInt(hex1.slice(1,3), 16), g1 = parseInt(hex1.slice(3,5), 16), b1 = parseInt(hex1.slice(5,7), 16);
    const r2 = parseInt(hex2.slice(1,3), 16), g2 = parseInt(hex2.slice(3,5), 16), b2 = parseInt(hex2.slice(5,7), 16);
    const r = Math.round(r1 * (1-ratio) + r2 * ratio);
    const g = Math.round(g1 * (1-ratio) + g2 * ratio);
    const b = Math.round(b1 * (1-ratio) + b2 * ratio);
    return '#' + [r,g,b].map(x => x.toString(16).padStart(2,'0')).join('');
}

function lightenColor(hex, percent) {
    const num = parseInt(hex.replace('#',''), 16);
    const amt = Math.round(2.55 * percent);
    const R = Math.min(255, (num >> 16) + amt);
    const G = Math.min(255, ((num >> 8) & 0xFF) + amt);
    const B = Math.min(255, (num & 0xFF) + amt);
    return '#' + (0x1000000 + R*0x10000 + G*0x100 + B).toString(16).slice(1);
}

function darkenColor(hex, percent) {
    const num = parseInt(hex.replace('#',''), 16);
    const amt = Math.round(2.55 * percent);
    const R = Math.max(0, (num >> 16) - amt);
    const G = Math.max(0, ((num >> 8) & 0xFF) - amt);
    const B = Math.max(0, (num & 0xFF) - amt);
    return '#' + (0x1000000 + R*0x10000 + G*0x100 + B).toString(16).slice(1);
}

// Get palette with hybrid support
function getHybridPalette() {
    let base = { ...PETS[currentPet] };
    if (hybridGenes && hybridGenes.color) {
        base.main = hybridGenes.color;
        base.light = lightenColor(hybridGenes.color, 25);
        base.dark = darkenColor(hybridGenes.color, 20);
        // Mix some features from second parent
        const p2 = PETS[hybridGenes.parent2];
        base.eye = Math.random() > 0.5 ? base.eye : p2.eye;
        base.nose = Math.random() > 0.5 ? base.nose : p2.nose;
    }
    return base;
}

// Draw BACK items (behind pet) - call BEFORE drawing pet
function drawBackItems() {
    if (equipped.back) {
        const b = equipped.back;
        ctx.save();
        
        if (b === 'cape' || b === '🦸') { // Cape
            ctx.translate(12, -18);
            ctx.rotate(Math.sin(frame * 0.04) * 0.15);
            const capeG = ctx.createLinearGradient(0, 0, 0, 40);
            capeG.addColorStop(0, '#9C27B0'); capeG.addColorStop(1, '#6A1B9A');
            ctx.fillStyle = capeG;
            ctx.beginPath();
            ctx.moveTo(-10, 0); ctx.quadraticCurveTo(-18, 22, -14, 42);
            ctx.lineTo(14, 42); ctx.quadraticCurveTo(18, 22, 10, 0);
            ctx.closePath(); ctx.fill();
            // Highlight
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            ctx.beginPath(); ctx.ellipse(-4, 15, 5, 12, -0.2, 0, Math.PI * 2); ctx.fill();
        }
        else if (b === '🎒') { // Backpack
            ctx.translate(14, -8);
            ctx.fillStyle = '#E91E63';
            ctx.beginPath(); ctx.roundRect(-12, -4, 24, 28, 5); ctx.fill();
            // Straps
            ctx.fillStyle = '#C2185B';
            ctx.fillRect(-10, -4, 4, 16); ctx.fillRect(6, -4, 4, 16);
            // Pocket
            ctx.fillStyle = '#F48FB1';
            ctx.beginPath(); ctx.roundRect(-7, 12, 14, 10, 3); ctx.fill();
        }
        else if (b === '🪶') { // Wings
            const wingFlap = Math.sin(frame * 0.12) * 0.25;
            // Left wing
            ctx.save(); ctx.translate(-8, -18); ctx.rotate(-0.4 + wingFlap);
            ctx.fillStyle = 'rgba(255,255,255,0.9)';
            ctx.beginPath(); ctx.ellipse(-12, 0, 14, 24, -0.3, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = 'rgba(200,200,255,0.6)';
            ctx.beginPath(); ctx.ellipse(-8, 0, 8, 16, -0.3, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
            // Right wing
            ctx.save(); ctx.translate(8, -18); ctx.rotate(0.4 - wingFlap);
            ctx.fillStyle = 'rgba(255,255,255,0.9)';
            ctx.beginPath(); ctx.ellipse(12, 0, 14, 24, 0.3, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = 'rgba(200,200,255,0.6)';
            ctx.beginPath(); ctx.ellipse(8, 0, 8, 16, 0.3, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }
        ctx.restore();
    }
}

// Draw FRONT items (on top of pet) - call AFTER drawing pet
function drawFrontItems() {
    // === HAT (on head) ===
    if (equipped.hat) {
        ctx.save();
        ctx.translate(0, -55); // Head position
        const h = equipped.hat;
        
        if (h === '👑') { // Crown
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.moveTo(-14, 8); ctx.lineTo(-16, -10); ctx.lineTo(-9, -3);
            ctx.lineTo(0, -14); ctx.lineTo(9, -3); ctx.lineTo(16, -10);
            ctx.lineTo(14, 8); ctx.closePath(); ctx.fill();
            ctx.fillStyle = '#E91E63'; ctx.beginPath(); ctx.arc(0, -2, 4, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#2196F3'; ctx.beginPath(); ctx.arc(-8, 1, 3, 0, Math.PI * 2); ctx.arc(8, 1, 3, 0, Math.PI * 2); ctx.fill();
        }
        else if (h === '🎩') { // Top hat
            ctx.fillStyle = '#1A1A1A';
            ctx.beginPath(); ctx.ellipse(0, 4, 18, 5, 0, 0, Math.PI * 2); ctx.fill();
            ctx.fillRect(-13, -20, 26, 24);
            ctx.fillStyle = '#9C27B0'; ctx.fillRect(-13, -6, 26, 5);
        }
        else if (h === '🎀') { // Bow
            ctx.fillStyle = '#FF4081';
            ctx.beginPath();
            ctx.ellipse(-10, 0, 10, 6, -0.2, 0, Math.PI * 2);
            ctx.ellipse(10, 0, 10, 6, 0.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#F50057'; ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI * 2); ctx.fill();
        }
        else if (h === '🥳') { // Party hat
            ctx.fillStyle = '#9C27B0';
            ctx.beginPath(); ctx.moveTo(-12, 6); ctx.lineTo(0, -22); ctx.lineTo(12, 6); ctx.closePath(); ctx.fill();
            ctx.fillStyle = '#E91E63';
            ctx.beginPath(); ctx.moveTo(-7, 2); ctx.lineTo(0, -14); ctx.lineTo(7, 2); ctx.closePath(); ctx.fill();
            ctx.fillStyle = '#FFEB3B'; ctx.beginPath(); ctx.arc(0, -22, 5, 0, Math.PI * 2); ctx.fill();
        }
        else if (h === '🌺') { // Flower crown
            const colors = ['#FF4081', '#FFEB3B', '#4CAF50', '#2196F3', '#FF9800'];
            for (let i = 0; i < 5; i++) {
                const angle = -0.5 + i * 0.25, fx = Math.sin(angle) * 18, fy = Math.cos(angle) * 4;

            }

        else if (h === '👓' || h === '🕶️') { // Glasses - on face
            ctx.save(); ctx.translate(0, 40);
            ctx.strokeStyle = '#1A1A1A'; ctx.lineWidth = 2.5;
            ctx.fillStyle = h === '🕶️' ? 'rgba(0,0,0,0.75)' : 'rgba(180,200,255,0.4)';
            ctx.beginPath(); ctx.ellipse(-9, 0, 9, 7, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.ellipse(9, 0, 9, 7, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(-1, 0); ctx.lineTo(1, 0); ctx.stroke();
            ctx.restore();
        }
        else if (h === '🧢') { // Baseball cap
            ctx.fillStyle = '#2196F3';
            ctx.beginPath(); ctx.arc(0, 2, 16, Math.PI, 2 * Math.PI); ctx.fill();
            ctx.fillRect(-16, 0, 32, 6);
            // Visor
            ctx.fillStyle = '#1976D2';
            ctx.beginPath(); ctx.ellipse(0, 6, 20, 6, 0, 0, Math.PI); ctx.fill();
        }
        else if (h === '⛑️') { // Hard hat / winter helmet
            ctx.fillStyle = '#FFC107';
            ctx.beginPath(); ctx.arc(0, 0, 18, Math.PI, 2 * Math.PI); ctx.fill();
            ctx.fillRect(-18, -2, 36, 8);
            ctx.fillStyle = '#FF9800';
            ctx.fillRect(-14, 2, 28, 4);
        }
        ctx.restore();
    }
    
    // === CLOTHING (neck/body) ===
    if (equipped.clothing) {
        ctx.save();
        const c = equipped.clothing;
        
        if (c === '🧣') { // Scarf - around neck
            ctx.translate(0, -14);
            ctx.fillStyle = '#F44336';
            ctx.beginPath(); ctx.ellipse(0, 0, 22, 8, 0, 0, Math.PI * 2); ctx.fill();
            // Hanging end
            ctx.fillStyle = '#D32F2F';
            ctx.beginPath();
            ctx.moveTo(8, 6); ctx.lineTo(14, 28); ctx.lineTo(6, 28); ctx.lineTo(4, 6);
            ctx.closePath(); ctx.fill();
            ctx.fillStyle = '#FFEB3B';
            ctx.fillRect(7, 14, 6, 3); ctx.fillRect(7, 22, 6, 3);
        }
        else if (c === 'bowtie') { // Bow tie - at neck
            ctx.translate(0, -10);
            ctx.fillStyle = '#3F51B5';
            ctx.beginPath();
            ctx.ellipse(-9, 0, 9, 6, -0.15, 0, Math.PI * 2);
            ctx.ellipse(9, 0, 9, 6, 0.15, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#303F9F'; ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI * 2); ctx.fill();
        }
        else if (c === 'collar') { // Collar with bell
            ctx.translate(0, -8);
            ctx.strokeStyle = '#E91E63'; ctx.lineWidth = 5;
            ctx.beginPath(); ctx.arc(0, 4, 16, 0.2 * Math.PI, 0.8 * Math.PI); ctx.stroke();
            ctx.fillStyle = '#FFD700'; ctx.beginPath(); ctx.arc(0, 16, 6, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#FFA000'; ctx.beginPath(); ctx.arc(0, 18, 2, 0, Math.PI * 2); ctx.fill();
        }
        else if (c === '🧥') { // Jacket
            ctx.translate(0, -8);
            ctx.fillStyle = '#795548';
            // Body
            ctx.beginPath(); ctx.roundRect(-20, -8, 40, 32, 5); ctx.fill();
            // Collar
            ctx.fillStyle = '#5D4037';
            ctx.beginPath();
            ctx.moveTo(-12, -8); ctx.lineTo(-18, 0); ctx.lineTo(-10, 4); ctx.lineTo(-8, -4);
            ctx.moveTo(12, -8); ctx.lineTo(18, 0); ctx.lineTo(10, 4); ctx.lineTo(8, -4);
            ctx.fill();
            // Buttons
            ctx.fillStyle = '#3E2723';
            ctx.beginPath(); ctx.arc(0, 4, 3, 0, Math.PI * 2); ctx.arc(0, 14, 3, 0, Math.PI * 2); ctx.fill();
        }
        else if (c === '🥼') { // Lab coat
            ctx.translate(0, -8);
            ctx.fillStyle = '#FAFAFA';
            ctx.beginPath(); ctx.roundRect(-22, -10, 44, 36, 4); ctx.fill();
            ctx.fillStyle = '#E0E0E0';
            ctx.beginPath();
            ctx.moveTo(-14, -10); ctx.lineTo(-20, 2); ctx.lineTo(-10, 6); ctx.lineTo(-10, -6);
            ctx.moveTo(14, -10); ctx.lineTo(20, 2); ctx.lineTo(10, 6); ctx.lineTo(10, -6);
            ctx.fill();
            ctx.fillStyle = '#90CAF9';
            ctx.beginPath(); ctx.roundRect(-8, 8, 6, 10, 2); ctx.fill();
        }
        ctx.restore();
    }
    
    // === ACCESSORY (held items, etc) ===
    if (equipped.accessory) {
        ctx.save();
        const a = equipped.accessory;
        
        if (a === '☂️') { // Umbrella - held above
            ctx.translate(16, -45);
            ctx.rotate(0.15);
            // Handle
            ctx.strokeStyle = '#795548'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, 50); ctx.stroke();
            ctx.beginPath(); ctx.arc(0, 54, 6, 0, Math.PI); ctx.stroke();
            // Canopy
            ctx.fillStyle = '#E91E63';
            ctx.beginPath(); ctx.arc(0, 0, 28, Math.PI, 2 * Math.PI); ctx.fill();
            ctx.fillStyle = '#F48FB1';
            for (let i = 0; i < 6; i++) {
                ctx.beginPath();
                ctx.moveTo(0, 0); ctx.arc(0, 0, 28, Math.PI + i * Math.PI / 6, Math.PI + (i + 0.5) * Math.PI / 6);
                ctx.fill();
            }
        }
        else if (a === '⌚') { // Watch - on front paw
            ctx.translate(-22, 0);
            ctx.fillStyle = '#607D8B';
            ctx.beginPath(); ctx.roundRect(-6, -8, 12, 16, 3); ctx.fill();
            ctx.fillStyle = '#90A4AE';
            ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#37474F';
            ctx.fillRect(-1, -3, 2, 4);
            ctx.fillRect(-2, 0, 4, 1);
        }
        else if (a === '🌟') { // Star badge - on chest
            ctx.translate(0, -5);
            const twinkle = Math.sin(frame * 0.1) * 0.2 + 1;
            ctx.scale(twinkle, twinkle);
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            for (let i = 0; i < 10; i++) {
                const angle = -Math.PI / 2 + i * Math.PI / 5;
                const r = i % 2 === 0 ? 12 : 6;
                const x = Math.cos(angle) * r, y = Math.sin(angle) * r;
                i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.closePath(); ctx.fill();
            ctx.fillStyle = '#FFF8E1'; ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI * 2); ctx.fill();
        }
        ctx.restore();
    }
}

animate();
</script>
